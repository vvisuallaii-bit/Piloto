<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sales Dashboard — Nov/Dec 2022</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f4f4f6;color:#1a1a1a;padding:20px}
  h1{font-size:16px;font-weight:600;color:#1a1a1a}
  .topbar{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 16px;margin-bottom:14px;flex-wrap:wrap;gap:10px}
  .filters{display:flex;gap:8px;flex-wrap:wrap}
  select{font-size:12px;padding:4px 8px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .kpi{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 16px;border-left:4px solid #185FA5}
  .kpi.green{border-left-color:#3B6D11}
  .kpi.amber{border-left-color:#854F0B}
  .kpi.purple{border-left-color:#534AB7}
  .kpi-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
  .kpi-val{font-size:22px;font-weight:600;color:#1a1a1a}
  .kpi-sub{font-size:11px;color:#999;margin-top:2px}
  .grid-main{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 16px}
  .card-title{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
  .rank-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0f0f0}
  .rank-row:last-child{border-bottom:none}
  .rank-name{font-size:12px;color:#1a1a1a;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rank-bar-wrap{flex:2;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden}
  .rank-bar{height:100%;border-radius:3px}
  .rank-val{font-size:11px;color:#666;min-width:65px;text-align:right}
  .leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .leg span{display:flex;align-items:center;gap:4px;font-size:11px;color:#555}
  .leg-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
  @media(max-width:700px){
    .kpis{grid-template-columns:1fr 1fr}
    .grid-main,.grid-3,.grid-2{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>&#9642; Sales performance &mdash; Nov / Dec 2022</h1>
  <div class="filters">
    <select id="fCity" onchange="go()"><option value="">All cities</option></select>
    <select id="fMgr"  onchange="go()"><option value="">All managers</option></select>
    <select id="fProd" onchange="go()"><option value="">All products</option></select>
    <select id="fChan" onchange="go()"><option value="">All channels</option></select>
  </div>
</div>

<div class="kpis">
  <div class="kpi">       <div class="kpi-label">Total revenue</div>   <div class="kpi-val" id="kRev">—</div><div class="kpi-sub" id="kOrd">—</div></div>
  <div class="kpi green"> <div class="kpi-label">Avg per order</div>   <div class="kpi-val" id="kAvg">—</div><div class="kpi-sub">per transaction</div></div>
  <div class="kpi amber"> <div class="kpi-label">Top product</div>     <div class="kpi-val" id="kTopP" style="font-size:15px;padding-top:3px">—</div><div class="kpi-sub" id="kTopPv">—</div></div>
  <div class="kpi purple"><div class="kpi-label">Top city</div>        <div class="kpi-val" id="kTopC" style="font-size:15px;padding-top:3px">—</div><div class="kpi-sub" id="kTopCv">—</div></div>
</div>

<div class="grid-main">
  <div class="card">
    <div class="card-title">Daily revenue trend</div>
    <div style="position:relative;height:200px"><canvas id="cTime" role="img" aria-label="Daily revenue trend"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">Channel mix</div>
    <div id="lChan" class="leg"></div>
    <div style="position:relative;height:160px"><canvas id="cChan" role="img" aria-label="Channel mix"></canvas></div>
  </div>
</div>

<div class="grid-3">
  <div class="card"><div class="card-title">Revenue by product</div><div id="rProd"></div></div>
  <div class="card"><div class="card-title">Revenue by city</div><div id="rCity"></div></div>
  <div class="card"><div class="card-title">Manager performance</div><div id="rMgr"></div></div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="card-title">Payment method</div>
    <div id="lPay" class="leg"></div>
    <div style="position:relative;height:160px"><canvas id="cPay" role="img" aria-label="Payment method distribution"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">Revenue by product (bars)</div>
    <div style="position:relative;height:160px"><canvas id="cProd" role="img" aria-label="Revenue by product bar chart"></canvas></div>
  </div>
</div>

let ALL=RAW, charts={};

function grp(data,key){
  const m={};
  data.forEach(r=>{m[r[key]]=(m[r[key]]||0)+r.rev;});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}

function parseDt(s){const p=s.split('/');return new Date(+p[2],+p[1]-1,+p[0]);}

function mkLeg(id,entries){
  const tot=entries.reduce((s,e)=>s+e[1],0);
  document.getElementById(id).innerHTML=entries.map((e,i)=>
    `<span><span class="leg-sq" style="background:${PALETTE[i%PALETTE.length]}"></span>${e[0]} ${Math.round(e[1]/tot*100)}%</span>`
  ).join('');
}

function mkRank(id,entries){
  const max=entries[0]?entries[0][1]:1;
  document.getElementById(id).innerHTML=entries.map((e,i)=>`
    <div class="rank-row">
      <div class="rank-name">${e[0]}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(e[1]/max*100)}%;background:${PALETTE[i%PALETTE.length]}"></div></div>
      <div class="rank-val">$${Math.round(e[1]).toLocaleString()}</div>
    </div>`).join('');
}

function kill(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

function render(data){
  const tot=data.reduce((s,r)=>s+r.rev,0);
  const avg=data.length?tot/data.length:0;
  const byP=grp(data,'product'),byC=grp(data,'city');
  const tp=byP[0]||['—',0],tc=byC[0]||['—',0];

  document.getElementById('kRev').textContent='$'+Math.round(tot).toLocaleString();
  document.getElementById('kOrd').textContent=data.length+' transactions';
  document.getElementById('kAvg').textContent='$'+avg.toFixed(0);
  document.getElementById('kTopP').textContent=tp[0];
  document.getElementById('kTopPv').textContent='$'+Math.round(tp[1]).toLocaleString();
  document.getElementById('kTopC').textContent=tc[0];
  document.getElementById('kTopCv').textContent='$'+Math.round(tc[1]).toLocaleString();

  const byDay={};
  data.forEach(r=>{byDay[r.date]=(byDay[r.date]||0)+r.rev;});
  const days=Object.keys(byDay).sort((a,b)=>parseDt(a)-parseDt(b));

  kill('cTime');
  charts['cTime']=new Chart(document.getElementById('cTime'),{
    type:'line',
    data:{labels:days,datasets:[{data:days.map(d=>byDay[d]),borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.07)',tension:0.3,fill:true,pointRadius:2,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:14}},
              y:{ticks:{font:{size:10},callback:v=>'$'+Math.round(v/1000)+'k'}}}}
  });

  const byChan=grp(data,'channel');
  mkLeg('lChan',byChan);
  kill('cChan');
  charts['cChan']=new Chart(document.getElementById('cChan'),{
    type:'doughnut',
    data:{labels:byChan.map(e=>e[0]),datasets:[{data:byChan.map(e=>e[1]),backgroundColor:byChan.map((_,i)=>PALETTE[i%PALETTE.length]),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false}}}
  });

  const byPay=grp(data,'payment');
  mkLeg('lPay',byPay);
  kill('cPay');
  charts['cPay']=new Chart(document.getElementById('cPay'),{
    type:'doughnut',
    data:{labels:byPay.map(e=>e[0]),datasets:[{data:byPay.map(e=>e[1]),backgroundColor:byPay.map((_,i)=>PALETTE[i%PALETTE.length]),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false}}}
  });

  kill('cProd');
  charts['cProd']=new Chart(document.getElementById('cProd'),{
    type:'bar',
    data:{labels:byP.map(e=>e[0]),datasets:[{data:byP.map(e=>e[1]),backgroundColor:byP.map((_,i)=>PALETTE[i%PALETTE.length]),borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10},callback:v=>'$'+Math.round(v/1000)+'k'}}}}
  });

  mkRank('rProd',byP);
  mkRank('rCity',byC);
  mkRank('rMgr',grp(data,'manager'));
}

function pop(){
  [['fCity','city'],['fMgr','manager'],['fProd','product'],['fChan','channel']].forEach(([id,k])=>{
    const sel=document.getElementById(id);
    [...new Set(ALL.map(r=>r[k]))].sort().forEach(v=>{
      const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);
    });
  });
}

function go(){
  const city=document.getElementById('fCity').value;
  const mgr=document.getElementById('fMgr').value;
  const prod=document.getElementById('fProd').value;
  const chan=document.getElementById('fChan').value;
  let d=ALL;
  if(city)d=d.filter(r=>r.city===city);
  if(mgr)d=d.filter(r=>r.manager===mgr);
  if(prod)d=d.filter(r=>r.product===prod);
  if(chan)d=d.filter(r=>r.channel===chan);
  render(d);
}

pop();
render(ALL);
